version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-change_me}@db:5432/enterprisemind
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-deepseek-r1:14b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_PROJECT=enterprisemind-docker
      - RUN_MODE=${RUN_MODE:-local}
      - ENABLE_SELF_RAG=${ENABLE_SELF_RAG:-true}
      - ENABLE_QUERY_OPTIMIZATION=${ENABLE_QUERY_OPTIMIZATION:-true}
      - PERSISTENT_CACHE_BACKEND=${PERSISTENT_CACHE_BACKEND:-sqlite}
      - PERSISTENT_CACHE_DB_PATH=${PERSISTENT_CACHE_DB_PATH:-./cache/persistent_cache.db}
      - PERSISTENT_CACHE_TTL_SECONDS=${PERSISTENT_CACHE_TTL_SECONDS:-3600}
      - PERSISTENT_CACHE_REDIS_PREFIX=${PERSISTENT_CACHE_REDIS_PREFIX:-persistent_cache:}
      - LLM_CACHE_BACKEND=${LLM_CACHE_BACKEND:-none}
      - LLM_CACHE_TTL_SECONDS=${LLM_CACHE_TTL_SECONDS:-3600}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./data:/app/data
      - app_logs:/app/logs
      - app_cache:/app/cache
      - app_memory:/app/memory
      - chroma_data:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - enterprisemind_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - enterprisemind_net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
      - POSTGRES_DB=enterprisemind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enterprisemind_net

volumes:
  postgres_data:
  app_logs:
  app_cache:
  app_memory:
  chroma_data:
  redis_data:

networks:
  enterprisemind_net:
    driver: bridge
